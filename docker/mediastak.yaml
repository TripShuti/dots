services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - 8096:8096
    volumes:
      - /home/trip/jellyfin/config:/config
      - /mnt/ssd/torrents/:/data/media:ro
    environment:
      - TZ=Europe/Kyiv
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kyiv
      - WEBUI_PORT=8080
    volumes:
      - /mnt/ssd/qbittorrent/config:/config
      - /mnt/ssd:/data
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    restart: unless-stopped

  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    user: 1000:1000
    ports:
      - 4533:4533
    environment:
      ND_LOGLEVEL: info
      ND_MUSICFOLDER: /music
      ND_DATALOCATION: /data
      ND_SCANINTERVAL: 1m
      ND_LASTFM_APIKEY: e09dd9f9f623c6c9c7e0732402a8d90f
      ND_LASTFM_SECRET: ef0b14de81d7e6bc80b3be6fc3e30024
    volumes:
      - /home/trip/navidrome/data:/data
      - /navidrome/navidrome_music:/music:ro
    restart: unless-stopped


