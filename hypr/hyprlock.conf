animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    path = /home/trip/.config/hypr/wp/wptn1.jpg
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 2
}

input-field {
    size = 250, 50 
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Парольчик..</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = JetBrainsMono Nerd Font
    position = 0, -200
    halign = center
    valign = top
}

label {
    text = cmd[update:10000] echo "$(LC_TIME=uk_UA.UTF-8 date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 0, -370
    halign = center
    valign = top
}

label {
    text = $USER
    color = rgba(255, 255, 255, 0.9)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

label {
    text = <span font_family='JetBrainsMono Nerd Font'> 󰤄 </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 40
    onclick = systemctl suspend
    position = -100, 80
    halign = center
    valign = bottom
}

label {
    text = <span font_family='JetBrainsMono Nerd Font'> 󰜉 </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 40
    onclick = reboot
    position = 0, 80
    halign = center
    valign = bottom
}

label {
    text = <span font_family='JetBrainsMono Nerd Font'> 󰐥 </span>
    color = rgba(255, 255, 255, 0.6)
    font_size = 40
    onclick = shutdown now
    position = 100, 80
    halign = center
    valign = bottom
}